<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="alternate" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | absolute_url }}">
  <meta name="theme-color" content="#0b57d0">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      { "@type": "Organization", "name": "Cadre", "url": "https://cadre3d.com/" },
      { "@type": "WebSite", "name": "Cadre Documentation", "url": "{{ '/' | absolute_url }}",
        "publisher": { "@type": "Organization", "name": "Cadre" } },
      { "@type": "SoftwareApplication", "name": "Cadre",
        "applicationCategory": "DesignApplication", "operatingSystem": "Any modern web browser",
        "url": "https://cadre3d.com/",
        "description": "AI co-reviewer for parametric CAD, in the browser." }
    ]
  }
  </script>
  <style>
    :root { --fg:#1b1f24; --muted:#5b6570; --bg:#fff; --accent:#0b57d0; --line:#e6e9ee; --code:#f4f6f9; }
    * { box-sizing:border-box; }
    body { color:var(--fg); background:var(--bg); padding:0;
      font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; flex-direction:column; align-items:center; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .site-header { width:100%; max-width:1080px; display:flex; flex-wrap:wrap; align-items:center;
      justify-content:space-between; gap:12px 20px; padding:16px 24px; border-bottom:1px solid var(--line); }
    .brand { font-weight:700; font-size:18px; color:var(--fg); }
    .brand span { color:var(--muted); font-weight:600; }
    .site-header nav { display:flex; flex-wrap:wrap; align-items:center; gap:16px; }
    .site-header nav a { color:var(--muted); font-size:14px; font-weight:500; }
    .site-header nav a.cta { color:#fff; background:var(--accent); padding:7px 14px; border-radius:7px; font-weight:600; }
    .site-header nav a.cta:hover { text-decoration:none; opacity:.92; }
    main.content { width:100%; max-width:760px; padding:8px 24px; }
    main.content h1 { font-size:2rem; line-height:1.2; }
    main.content h2 { font-size:1.35rem; padding-top:1.1em; border-top:1px solid var(--line); }
    main.content h3 { font-size:1.1rem; }
    main.content blockquote { padding:.6em 1em; border-left:4px solid var(--accent);
      background:#f5f8ff; border-radius:0 6px 6px 0; }
    main.content code { background:var(--code); padding:.15em .4em; border-radius:4px; font-size:.9em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    main.content pre { background:var(--code); padding:14px 16px; border-radius:8px; overflow-x:auto; }
    main.content pre code { background:none; padding:0; }
    main.content table { border-collapse:collapse; width:100%; display:block; overflow-x:auto; }
    main.content th, main.content td { border:1px solid var(--line); padding:8px 12px; text-align:left; vertical-align:top; }
    main.content th { background:var(--code); }
    .site-footer { width:100%; max-width:1080px; padding:24px; border-top:1px solid var(--line);
      color:var(--muted); font-size:14px; }
    @media (max-width:600px){ .site-header nav a:not(.cta){ display:none; } }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">Cadre <span>Docs</span></a>
    <nav>
      <a href="{{ '/architecture.html' | relative_url }}">Architecture</a>
      <a href="{{ '/methodology.html' | relative_url }}">Methodology</a>
      <a href="{{ '/trust.html' | relative_url }}">Trust</a>
      <a href="{{ '/features/ai-review.html' | relative_url }}">AI review</a>
      <a class="cta" href="https://cadre3d.com/">Open Cadre &rarr;</a>
    </nav>
  </header>
  <main class="content">
    {{ content }}
  </main>
  <footer class="site-footer">
    Cadre — AI co-reviewer for parametric CAD.
    <a href="https://cadre3d.com/">Try it in your browser &rarr;</a>
  </footer>
</body>
</html>
